apiVersion: v1
kind: Pod
metadata:
  labels:
    run: nginx-selector
  name: nginx-selector
spec:
  nodeSelector:
    kubernetes.io/hostname: minikube
  tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"	
  containers:
  - image: nginx
    name: nginx-selector
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}
