apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-job
spec:
  jobTemplate:
    metadata:
      name: my-job
    spec:
      activeDeadlineSeconds: 10
      template:
        metadata: {}
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - date; echo hello; sleep 20; echo from the kubernetes cluster
            image: busybox
            name: my-job
            resources: {}
          restartPolicy: Never
  schedule: '*/1 * * * *'
status: {}
