apiVersion: v1
kind: Pod
metadata:
  labels:
    run: nginx3
  name: nginx3
spec:
  volumes:
  - name: myvolume
    configMap:
      name: cmvolume
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - name: myvolume
      mountPath: /etc/lala
  resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}
